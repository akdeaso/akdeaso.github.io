<html>

<head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        .infobox {
            margin-top: 15px;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <form>
            <div class="custom-control custom-checkbox">
                <input type="checkbox" id="pizza" name="pizza" value=5 class="infobox custom-control-input">
                <label class="custom-control-label" for="pizza">Pizza $5</label>
            </div>
            <div class="custom-control custom-checkbox">
                <input type="checkbox" id="hotdog" name="hotdog" value=2 class="infobox custom-control-input">
                <label class="custom-control-label" for="hotdog">HotDog $2</label>
            </div>
            <div class="custom-control custom-checkbox">
                <input type="checkbox" id="coke" name="coke" value=1 class="infobox custom-control-input">
                <label class="custom-control-label" for="coke">Coke $1</label>
            </div>
            <div class="custom-control custom-checkbox">
                <input type="checkbox" id="fries" name="fries" value=3 class="infobox custom-control-input">
                <label class="custom-control-label" for="fries">French Fries $3</label>
            </div>
            <p class="error">Select at least one checkbox </p>
            <p class="result"></p>
            <input class="submit btn btn-primary" type="submit" value="Submit">
        </form>
    </div>
    <script>
        $(document).ready(function () {
            $('.error').hide();
            $('.submit').click(function (event) {
                var count = 0;
                var amt = 0;
                $('form').find(':checkbox').each(function () {
                    if ($(this).is(':checked')) {
                        count++;
                        amt = amt + parseInt($(this).val());
                    }
                });
                if (count == 0) {
                    $('p.result').hide();
                    $('.error').show();
                }
                else {
                    $('.error').hide();
                    $('p.result').show();
                    $('p.result').text('Your bill is $ ' + amt);
                }
                event.preventDefault();
            });
        });
    </script>
</body>

</html>
