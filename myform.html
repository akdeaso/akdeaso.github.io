<html>

<head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>

<body>
    <div class="container mt-3">
        <form>
            <div class="custom-control custom-checkbox">
                <input type="checkbox" id="pizza" name="pizza" value=5 class="infobox custom-control-input">
                <label class="custom-control-label" for="pizza">Pizza $5</label>
            </div>
            <div class="custom-control custom-checkbox">
                <input type="checkbox" id="hotdog" name="hotdog" value=2 class="infobox custom-control-input">
                <label class="custom-control-label" for="hotdog">HotDog $2</label>
            </div>
            <div class="custom-control custom-checkbox">
                <input type="checkbox" id="coke" name="coke" value=1 class="infobox custom-control-input">
                <label class="custom-control-label" for="coke">Coke $1</label>
            </div>
            <div class="custom-control custom-checkbox mb-2">
                <input type="checkbox" id="fries" name="fries" value=3 class="infobox custom-control-input">
                <label class="custom-control-label" for="fries">French Fries $3</label>
            </div>
            <p class="error mt-2 alert alert-danger">Pilih setidaknya satu checkbox</p>
            <p class="result mt-2 alert alert-info"></p>
            <input class="submit btn btn-primary mt-1" type="submit" value="Submit">
        </form>
    </div>
    <script>
        $(document).ready(function () {
            $('.error').hide(); //class dengan nama error disembunyikan terlebih dahulu
            $('.result').hide(); //class dengan nama result disembunyikan terlebih dahulu
            $('.submit').click(function (event) { //tombol submit diklik
                var count = 0; //menginisialisasi counter count ke angka 0
                var amt = 0; //menginisialisasi variabel amt ke angka 0
                $('form').find(':checkbox').each(function () { //periksa semua checkbox dari elemen form satu per satu
                    if ($(this).is(':checked')) { //jika ditemukan checkbox yang telah dicentang
                        count++; //maka counter count mengalami penambahan nilai atau increment
                        amt = amt + parseInt($(this).val()); //menambahkan jumlah item makanan ke variabel amt yang dirubah ke bentuk number
                    }
                });
                if (count == 0) { //jika ditemukan nilai count adalah 0, maka:
                    $('p.result').hide(); //elemen p dengan class result disembunyikan
                    $('.error').show(); //dan class error ditampilkan
                }
                else { //jika tidak, maka:
                    $('.error').hide(); //class error disembunyikan 
                    $('p.result').show(); //elemen p dengan class result ditampilkan
                    $('p.result').text('Tagihan Anda adalah $' + amt); //dan menetapkan teks yaitu Tagihan Anda adalah $ + amt, dimana amt adalah variabel yang menyimpan jumlah total item makanan yang dipilih
                }
                event.preventDefault(); //method ini digunakan untuk mencegah tombol submit dari mengirimkan form
            });
        });
    </script>
</body>

</html>
