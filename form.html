    <!--form-->
    <div class="container mt-2 mb-4">
        <div class=" title">
            <h1 class="section-title">Daftar Kursus</h1>
        </div>
        <div class="row justify-content-md-center">
            <div class="col-sm-6">
                <form>
                    <div class="form-group" id="form">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" placeholder="Masukkan email (ex: nama@domain.com)"
                            id="email">
                        <p class="error" id="error">Tolong isi field ini</p>
                    </div>
                    <div class="form-group">
                        <label for="nama">Nama</label>
                        <input type="text" class="form-control" placeholder="Masukkan nama" id="nama">
                        <p class="error" id="error">Tolong isi field ini</p>
                    </div>
                    <div class="form-group">
                        <label for="nama">Usia</label>
                        <input type="text" class="form-control" placeholder="Masukkan usia" id="nama">
                        <p class="error" id="error">Harap isi field ini dengan angka saja</p>
                    </div>
                    <div class="form-group">
                        <label for="nohp">No. Telepon</label>
                        <input type="text" class="form-control" placeholder="Masukkan no. telepon (ex: 0123456789012)"
                            id="notelp">
                        <p class="error" id="error">Harap isi field ini dengan angka saja</p>
                    </div>
                    <label for="kelas">Kelas</label>
                    <select class="custom-select mb-3" id="kelas">
                        <option value="0">Pilih kelas...</option>
                        <option value="n5r">N5 - Kelas Reguler</option>
                        <option value="n5p">N5 - Kelas Privat</option>
                        <option value="n5o">N5 - Kelas Online</option>
                        <option value="n4r">N4 - Kelas Reguler</option>
                        <option value="n4p">N4 - Kelas Privat</option>
                        <option value="n4o">N4 - Kelas Online</option>
                    </select>
                    <p class="selecterror" id="error">Tolong pilih salah satu</p>
                    <button type="submit" class="submit btn btn-success">Daftar</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $('.error').hide();
            $('.selecterror').addClass('error');
            $('.selecterror').hide();
            $('.submit').click(function (event) {
                data = $('#email').val();
                if (valid_email(data)) {
                    $('#email').next().hide();
                }
                else {
                    $('#email').next().show();
                }
                var data = $('#nama').val();
                var len = data.length;
                if (len > 1) {
                    $('#nama').next().hide();
                }
                else {
                    $('#nama').next().show();
                }
                data = $('#usia').val();
                if (validate_usia(data)) {
                    $('#usia').next().hide();
                }
                else {
                    $('#usia').next().show();
                }
                data = $('#notelp').val();
                if (validate_notelp(data)) {
                    $('#notelp').next().hide();
                }
                else {
                    $('#notelp').next().show();
                }
                count = $('select option:selected').val();
                if (count == 0) {
                    $('#kelas').next().show();
                }
                else {
                    $('#kelas').next().hide();
                }
                event.preventDefault();
            });
        });
        function valid_email(email) {
            var pattern = new RegExp(/^[\w-]+(\.[\w-]+)*@([\w-]+\.)+[a-zA-Z]+$/);
            return pattern.test(email);
        }
        function validate_notelp(notelp) {
            var pattern = new RegExp(/^[0-9]+$/);
            return pattern.test(notelp);
        }
        function validate_notelp(notelp) {
            var pattern = new RegExp(/^[0-9]+$/);
            return pattern.test(notelp);
        }
    </script>
